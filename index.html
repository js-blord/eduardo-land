<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="look.css">
    <title>Login</title>
</head>
    <!-- index.html -->
<svg style="display: none;">
  <defs>
    <filter id="fisheye" x="-10%" y="-10%" width="120%" height="120%">
      <!-- Radial displacement map to warp pixels from center outward -->
      <feTurbulence type="fractalNoise" baseFrequency="0.00001" numOctaves="1" result="noise" />
      <feImage result="map" xlink:href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><defs><radialGradient id='g' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='%23808080'/><stop offset='70%' stop-color='%23808080'/><stop offset='100%' stop-color='%23000000'/></radialGradient></defs><rect width='100' height='100' fill='url(%23g)'/></svg>" />
      <feDisplacementMap in="SourceGraphic" in2="map" scale="40" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>
<body>
    <!-- Flicker overlay sections for CRT screen effect -->
    <div class="flicker-section flicker-top-left"></div>
    <div class="flicker-section flicker-top-right"></div>
    <div class="flicker-section flicker-middle-left"></div>
    <div class="flicker-section flicker-middle-right"></div>
    <div class="flicker-section flicker-bottom-left"></div>
    <div class="flicker-section flicker-bottom-right"></div>

    <form action="/login" method="post">
        <div class="container">
            <label for="UID"><b> </b></label>
            <input type="text" id="UID" placeholder=" " name="uname" >

            <label for="PW"><b> </b></label>
            <input type="password" id="PW" placeholder=" " name="psw" >

            <button type="submit"> </button>
        </div>
    </form>
</body>
</html>

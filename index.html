<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="look.css">
    <title>Document</title>
</head>

<script>
    let correctUID = "XLTL3902SEADMIN"
    let correctPW = "LARVAEGROWSINTHEMINDOFTHEANGEL"

    function loginCheck() {
        const UIDattempt = document.getElementById("UID").value;
        const PWattempt = document.getElementById("PW").value;
        
        if (UIDattempt != correctUID || PWattempt != correctPW) { 
            alert("incorrect")
        } else{
            alert("correct")
        }    
    }
</script>
    
<body>

<form action="/login" method="post">
    <div class="container">
        <label for="UID"><b>Username</b></label>
        <input type="text" id="UID" placeholder="Enter Username" name="uname" required>

        <label for="PW"><b>Password</b></label>
        <input type="password" id="PW" placeholder="Enter Password" name="psw" required>

        <button type="button" onclick="loginCheck()">Login</button>
    </div>
</form>

</body>
</html>
